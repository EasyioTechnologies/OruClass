services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: oruclass
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: oruclass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oruclass"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: always
    env_file: .env
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "3001"
    ports:
      - "127.0.0.1:5011:3001"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.oruclass-api.entrypoints=websecure"
      - "traefik.http.routers.oruclass-api.rule=Host(`api.dezignbuild.site`)"
      - "traefik.http.routers.oruclass-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.oruclass-api.loadbalancer.server.url=http://127.0.0.1:5011"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WEB_URL: ${NEXT_PUBLIC_WEB_URL}
    restart: always
    env_file: .env
    environment:
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "3000"
    ports:
      - "127.0.0.1:5010:3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.oruclass-web.entrypoints=websecure"
      - "traefik.http.routers.oruclass-web.rule=Host(`dezignbuild.site`) || Host(`www.dezignbuild.site`)"
      - "traefik.http.routers.oruclass-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.oruclass-web.loadbalancer.server.url=http://127.0.0.1:5010"

volumes:
  postgres_data:
  redis_data:
