name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check
        run: |
          bun --cwd apps/api run type-check
          bun --cwd apps/web run type-check

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test
